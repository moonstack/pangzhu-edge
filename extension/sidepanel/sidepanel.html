<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="sidepanel.css" />
  <title>旁注</title>
</head>
<body>
  <header id="bar">
    <div class="brand">
      <span class="logo" aria-hidden="true">◆</span>
      <span class="title">旁注</span>
      <span id="status" class="status">连接中…</span>
    </div>
    <div class="actions">
      <button id="lang" class="iconbtn" type="button" data-i18n-title="langTitle">中</button>
      <button id="settings" class="iconbtn" type="button" data-i18n-title="settings" data-i18n-aria="settings">⚙</button>
      <button id="newchat" class="iconbtn" type="button" data-i18n-title="newChat" data-i18n-aria="newChat">＋</button>
    </div>
  </header>

  <div id="ctxbar" data-i18n-title="ctxbarTitle">
    <span id="ctxtitle" class="ctx-title">当前页面…</span>
    <button id="lock" class="lock" type="button">🔓</button>
  </div>

  <div id="quickbar">
    <button class="chip" data-act="summary" data-i18n="chip_summary" type="button">总结</button>
    <button class="chip" data-act="translate" data-i18n="chip_translate" type="button">翻译</button>
    <button class="chip" data-act="keypoints" data-i18n="chip_keypoints" type="button">要点</button>
    <button class="chip" data-act="outline" data-i18n="chip_outline" type="button">大纲</button>
    <button class="chip" data-act="data" data-i18n="chip_data" type="button">挑数据</button>
    <button class="chip" data-act="factcheck" data-i18n="chip_factcheck" type="button">核查</button>
    <button class="chip" id="multitab" type="button" data-i18n="multitab" data-i18n-title="multitabTitle">多页对比</button>
  </div>

  <div id="actbar" class="actbar" hidden>
    <span class="act-ico" aria-hidden="true">🛠</span>
    <span class="act-label" data-i18n="actLabel">动手</span>
    <span class="act-dir-wrap" data-i18n-title="actDirWrapTitle">
      <span id="actdir" class="act-dir">…</span>
    </span>
    <button id="actdir-edit" class="act-edit" type="button" data-i18n="actEdit" data-i18n-title="actEditTitle">改</button>
  </div>

  <main id="transcript" aria-live="polite">
    <div id="empty" class="empty">
      <div class="empty-logo">◆</div>
      <p data-i18n-html="emptyHtml">上方一键处理这一页,<br/>或在下面就这页直接发问。</p>
    </div>
  </main>

  <footer id="composer">
    <textarea id="input" rows="1" data-i18n-ph="placeholder" placeholder="就这页问点什么…"></textarea>
    <div class="composer-tools">
      <button id="web" class="iconbtn" type="button" title="联网:让它上网查证(较慢,走你的订阅)">🌐</button>
      <button id="actmode" class="iconbtn" type="button" title="动手:让它在指定目录内读写文件(计划→批准→执行)">🛠</button>
      <button id="vision" class="iconbtn" type="button" title="看图:发送时附带当前屏幕截图">📷</button>
      <span class="grow"></span>
      <button id="send" class="sendbtn" type="button" title="发送" aria-label="发送">↑</button>
    </div>
  </footer>

  <script src="../lib/purify.min.js"></script>
  <script src="../lib/marked.min.js"></script>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
